services:
  notif-server:
    image: filipeai/notif:latest
    build: .
    ports:
      - "8787:8787"
    environment:
      - NOTIF_API_KEY=${NOTIF_API_KEY:-}
      - NOTIF_SERVER_HOST=0.0.0.0
      - NOTIF_SERVER_PORT=8787
    volumes:
      - notif-data:/data
    restart: unless-stopped

volumes:
  notif-data:
