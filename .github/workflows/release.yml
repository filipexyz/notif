name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: notif-x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: notif-aarch64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: notif-x86_64-unknown-linux-gnu

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p notif

      - name: Package
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/notif dist/
          cd dist
          tar -czvf ${{ matrix.artifact }}.tar.gz notif
          shasum -a 256 ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.tar.gz*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: v${{ github.event.inputs.version }}
          files: artifacts/**/*
          generate_release_notes: true

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get SHA256 sums
        id: sha
        run: |
          echo "darwin_arm64=$(cat artifacts/notif-aarch64-apple-darwin/notif-aarch64-apple-darwin.tar.gz.sha256 | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "darwin_amd64=$(cat artifacts/notif-x86_64-apple-darwin/notif-x86_64-apple-darwin.tar.gz.sha256 | awk '{print $1}')" >> $GITHUB_OUTPUT
          echo "linux_amd64=$(cat artifacts/notif-x86_64-unknown-linux-gnu/notif-x86_64-unknown-linux-gnu.tar.gz.sha256 | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Update Homebrew formula
        uses: peter-evans/repository-dispatch@v2
        with:
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          repository: filipexyz/homebrew-tap
          event-type: update-formula
          client-payload: |
            {
              "version": "${{ github.event.inputs.version }}",
              "darwin_arm64_sha": "${{ steps.sha.outputs.darwin_arm64 }}",
              "darwin_amd64_sha": "${{ steps.sha.outputs.darwin_amd64 }}",
              "linux_amd64_sha": "${{ steps.sha.outputs.linux_amd64 }}"
            }
